        // CSV Auditor Game state variables
        function checkGameRow(row, category) {

        // Active selection for Live CSV tab
        let currentCSVTab = 'v1';

        function toggleCSVInspector(tab) {
            currentCSVTab = tab;
            const btnV1 = document.getElementById('btn-csv-v1');
            const btnV2 = document.getElementById('btn-csv-v2');

            if (tab === 'v1') {
                btnV1.className = "text-xs font-bold px-4 py-1.5 rounded-md transition-all bg-coral-500 text-white shadow-sm";

            } else {
                btnV2.className = "text-xs font-bold px-4 py-1.5 rounded-md transition-all bg-coral-500 text-white shadow-sm";

        }

        function loadCSVTable(data, headers) {
            const thead = document.getElementById('csv-thead-row');
            const tbody = document.getElementById('csv-tbody');

            if (!thead || !tbody) return;

            // Load Headers
            thead.innerHTML = headers.map(h => `<th class="p-3">${h}</th>`).join('');

            // Load Rows
            tbody.innerHTML = data.map(row => {
                const identifier = row.login_id || row.wallet_id;
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 text-slate-900 font-medium whitespace-nowrap overflow-hidden text-ellipsis max-w-xs" title="${identifier}">${identifier}</td>
                        <td class="p-3 text-slate-600">${row.currency}</td>
                        <td class="p-3 text-slate-900 font-semibold">$${row.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="p-3"><span class="px-2 py-0.5 text-[9px] font-bold rounded-full ${row.type === 'Adjustment' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}">${row.type}</span></td>
                        <td class="p-3 text-slate-500 whitespace-nowrap text-ellipsis max-w-xs" title="${row.comment}">${row.comment}</td>
                    </tr>
                `;
            }).join('');
        }

        // Quiz Logic State
        const quizQuestions = [
            {

                    "False. Our system strictly requires a second Reconciliation team member to execute and approve payments."
                ],
                correct: 1,
                hint: "Think about the four-eyes principal mentioned in Slide 9!"
            }
        ];

        let quizCurrentIndex = 0;
        let quizUserAnswers = [];
        let quizScore = 0;

        function loadQuizQuestion() {
            const box = document.getElementById('quiz-question-box');
            if (!box) return;

            const q = quizQuestions[quizCurrentIndex];
            const isCompleted = quizCurrentIndex >= quizQuestions.length;

            if (isCompleted) {
                renderQuizResults();
                return;
            }

            box.innerHTML = `
                <div class="space-y-2">
                    <span class="text-[10px] font-extrabold uppercase bg-coral-100 text-coral-800 px-2.5 py-1 rounded">Question ${quizCurrentIndex + 1} of 5</span>
                    <h4 class="font-extrabold text-slate-900 text-base leading-snug mt-2">${q.q}</h4>
                </div>

                <div class="space-y-2 mt-4">
                    ${q.options.map((opt, idx) => `
                        <label class="flex items-start space-x-3 bg-white hover:bg-coral-50 border border-slate-200 p-3 rounded-xl cursor-pointer transition-all">
                            <input type="radio" name="quiz-opt" value="${idx}" class="mt-1 h-4 w-4 text-coral-500 focus:ring-coral-500">
                            <span class="text-xs text-slate-700 font-medium">${opt}</span>
                        </label>
                    `).join('')}
                </div>

                <div class="bg-coral-50 border border-coral-100 rounded-xl p-3 text-[11px] text-coral-800 mt-4 flex items-start space-x-2">
                    <span class="font-bold">💡 Tip:</span>
                    <p class="leading-relaxed">${q.hint}</p>
                </div>
            `;

            document.getElementById('quiz-progress-text').innerText = `Question ${quizCurrentIndex + 1} of ${quizQuestions.length}`;
            document.getElementById('quiz-next-btn').innerText = quizCurrentIndex === quizQuestions.length - 1 ? "Finish Test" : "Confirm Answer";
        }

        function nextQuizQuestion() {
            const selected = document.querySelector('input[name="quiz-opt"]:checked');
            if (!selected) {
                showAppModal('Please Select an Option', 'You must choose an answer option to proceed with the quiz.', 'error');
                return;
            }

            const answerIdx = parseInt(selected.value);
            quizUserAnswers.push(answerIdx);

            // Double check correctness
            if (answerIdx === quizQuestions[quizCurrentIndex].correct) {
                quizScore++;
            }

            quizCurrentIndex++;

            if (quizCurrentIndex < quizQuestions.length) {
                loadQuizQuestion();
            } else {
                renderQuizResults();
            }
        }

        function renderQuizResults() {
            const box = document.getElementById('quiz-question-box');
            const footer = document.getElementById('quiz-footer');

            footer.classList.add('hidden');

            const passed = quizScore >= 4;

                box.innerHTML = `

                        <div class="border-4 border-dashed border-coral-300 rounded-xl p-6 bg-white space-y-4 relative overflow-hidden shadow-sm">

                            </div>
                        </div>

                        <button onclick="resetQuizState()" class="text-xs font-bold text-coral-500 hover:text-coral-700 underline block mx-auto">

                    </div>
                `;
            } else {

                        <p class="text-xs text-slate-600 leading-relaxed max-w-sm mx-auto">Review the checklist (Slide 6) and system separation details (Slide 3) before retrying!</p>

                            Restart Quiz
                        </button>
                    </div>
                `;
            }
        }

        function resetQuizState() {
            quizCurrentIndex = 0;
            quizUserAnswers = [];
            quizScore = 0;
            const footer = document.getElementById('quiz-footer');
            if (footer) footer.classList.remove('hidden');
            loadQuizQuestion();
        }

        // Global Presentation Slide Controller
        function changeSlide(direction) {
            let nextIdx = currentSlideIdx + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                renderSlide(nextIdx);
            }
        }

        function renderSlide(idx) {
            currentSlideIdx = idx;
            const stage = document.getElementById('slide-stage');
            const footerPrev = document.getElementById('btn-prev');
            const footerNext = document.getElementById('btn-next');
            const currentBadge = document.getElementById('current-slide-badge');
            
            // Apply simple slide transitions
            stage.classList.remove('slide-active');
            stage.classList.add('slide-enter');

            // Set current side info tip
            const tipEl = document.getElementById('handover-tip');
            if (tipEl) {
                tipEl.innerText = slides[idx].tip;
            }

            setTimeout(() => {
                // Render slide markup
                stage.innerHTML = slides[idx].render();
                stage.classList.add('slide-active');
                stage.classList.remove('slide-enter');

                // Adjust disabled navigation states
                footerPrev.disabled = idx === 0;
                footerPrev.style.opacity = idx === 0 ? "0.4" : "1";
                
                // If it is the last slide, hide standard Next button functionality to prevent overflow
                if (idx === slides.length - 1) {
                    footerNext.style.opacity = "0.4";
                    footerNext.disabled = true;
                } else {
                    footerNext.style.opacity = "1";
                    footerNext.disabled = false;
                }

                currentBadge.innerText = idx + 1;

                // Sync indices
                renderSidebarNav();
                renderProgressDots();

                // Extra initializations per slide
                if (idx === 6) {
                    // Check if game-feedback-panel is present and reset
                } else if (idx === 9) {
                    toggleCSVInspector('v1');
                } else if (idx === 11) {
                    resetQuizState();
                }
            }, 100);
        }

        // Dynamic sidebar render
        function renderSidebarNav() {
            const nav = document.getElementById('sidebar-nav');
            if (!nav) return;

            nav.innerHTML = slides.map((slide, idx) => {
                const isActive = idx === currentSlideIdx;
                return `
                    <button onclick="renderSlide(${idx})" class="w-full text-left flex items-center space-x-3 px-3 py-2.5 rounded-lg text-xs font-semibold tracking-tight transition-all ${isActive ? 'bg-coral-500 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200 hover:text-slate-900'}">
                        <span class="w-5 h-5 rounded-full flex items-center justify-center border font-mono ${isActive ? 'bg-coral-600 border-coral-400 text-white' : 'bg-slate-200 border-slate-300 text-slate-600'}">
                            ${idx + 1}
                        </span>
                        <span class="truncate">${slide.title.replace(/^\d+\.\s*/, '')}</span>
                    </button>
                `;
            }).join('');
        }

        // Progress Dots controller
        function renderProgressDots() {
            const container = document.getElementById('progress-dots-container');
            if (!container) return;

            container.innerHTML = slides.map((_, idx) => {
                const isActive = idx === currentSlideIdx;
                return `
                    <button onclick="renderSlide(${idx})" class="w-2.5 h-2.5 rounded-full transition-all ${isActive ? 'bg-coral-500 scale-125' : 'bg-slate-700 hover:bg-slate-500'}" title="Go to slide ${idx + 1}"></button>
                `;
            }).join('');
        }

        // Native Alert Alternative Dialog popups
        function showAppModal(title, desc, type = 'success') {
            const modal = document.getElementById('app-modal');
            const mTitle = document.getElementById('modal-title');
            const mDesc = document.getElementById('modal-desc');
            const iconContainer = document.getElementById('modal-icon-container');

            if (!modal) return;

            mTitle.innerText = title;
            mDesc.innerText = desc;

            // Type theme
            if (type === 'success') {
                iconContainer.className = "bg-emerald-500 text-white rounded-full p-2 shrink-0";
                iconContainer.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                `;
            } else {
                iconContainer.className = "bg-red-500 text-white rounded-full p-2 shrink-0";
                iconContainer.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                `;
            }

            modal.classList.remove('hidden');

            // Autoclose after 4.5s
            setTimeout(() => {
                closeAppModal();
            }, 4500);
        }

        function closeAppModal() {
            const modal = document.getElementById('app-modal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        // On App Initialization bootstrap
        window.onload = function () {
            renderSlide(0);
        };
    </script>
